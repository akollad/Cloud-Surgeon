openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Cloud-Surgeon Agent API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: incidents
  - name: metrics
  - name: logs
  - name: chaos
  - name: webhooks
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Incidents ─────────────────────────────────────────────────────────────
  /incidents/trigger:
    post:
      operationId: triggerIncident
      tags: [incidents]
      summary: Trigger or resume the Cloud-Surgeon agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertInput"
      responses:
        "200":
          description: Incident created or resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"
        "400":
          description: Invalid request body

  /incidents:
    get:
      operationId: listIncidents
      tags: [incidents]
      summary: List recent incidents
      responses:
        "200":
          description: Recent incidents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Incident"

  /incidents/{incidentId}:
    get:
      operationId: getIncident
      tags: [incidents]
      summary: Get a single incident
      parameters:
        - name: incidentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The incident
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"
        "404":
          description: Not found

  /incidents/{incidentId}/approve:
    post:
      operationId: approveIncident
      tags: [incidents]
      summary: Approve a PENDING_APPROVAL incident
      parameters:
        - name: incidentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"

  /incidents/{incidentId}/reject:
    post:
      operationId: rejectIncident
      tags: [incidents]
      summary: Reject a PENDING_APPROVAL incident
      parameters:
        - name: incidentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"

  /incidents/{incidentId}/correct:
    post:
      operationId: correctIncident
      tags: [incidents]
      summary: Apply a human strategy correction
      parameters:
        - name: incidentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CorrectionInput"
      responses:
        "200":
          description: Corrected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"

  /incidents/{incidentId}/causal-chain:
    get:
      operationId: getIncidentCausalChain
      tags: [incidents]
      summary: Get causal chain via recursive CTE
      parameters:
        - name: incidentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Causal chain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CausalChainResult"

  /incidents/{incidentId}/playbook:
    get:
      operationId: getIncidentPlaybook
      tags: [incidents]
      summary: Get AI-generated repair playbook for an incident (Feature 1 — Explainable AI)
      parameters:
        - name: incidentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Playbook
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Playbook"
        "404":
          description: Playbook not found

  /incidents/{incidentId}/rollback-plan:
    get:
      operationId: getIncidentRollbackPlan
      tags: [incidents]
      summary: Get rollback plan for an incident (Feature 3 — Rollback Policy)
      parameters:
        - name: incidentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rollback plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RollbackPlanResult"
        "404":
          description: Rollback plan not found

  /incidents/{incidentId}/handoffs:
    get:
      operationId: getIncidentHandoffs
      tags: [incidents]
      summary: Get agent handoffs for an incident
      parameters:
        - name: incidentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Handoffs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Handoff"

  /handoffs:
    get:
      operationId: listHandoffs
      tags: [incidents]
      summary: List all agent handoffs
      responses:
        "200":
          description: All handoffs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Handoff"

  # ── Logs ──────────────────────────────────────────────────────────────────
  /logs:
    get:
      operationId: listExecutionLogs
      tags: [logs]
      summary: List execution log entries
      parameters:
        - name: incidentId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExecutionLog"

  /logs/count:
    get:
      operationId: countExecutionLogs
      tags: [logs]
      summary: Count execution log entries
      parameters:
        - name: incidentId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogCount"

  # ── Metrics ───────────────────────────────────────────────────────────────
  /metrics/win-rates:
    get:
      operationId: getWinRates
      tags: [metrics]
      summary: Per-strategy win rates from CockroachDB
      responses:
        "200":
          description: Win rates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WinRate"

  /metrics/impact:
    get:
      operationId: getImpactMetrics
      tags: [metrics]
      summary: MTTR and cost savings vs human baseline
      responses:
        "200":
          description: Impact metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpactMetrics"

  /metrics/calibration:
    get:
      operationId: getCalibration
      tags: [metrics]
      summary: Bandit calibration correction factors
      responses:
        "200":
          description: Calibration data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalibrationEntry"

  /metrics/calibration/recalibrate:
    post:
      operationId: recalibrate
      tags: [metrics]
      summary: Force bandit recomputation
      responses:
        "200":
          description: Recalibrated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecalibrateResult"

  /metrics/ccloud:
    get:
      operationId: getCcloudMetrics
      tags: [metrics]
      summary: CockroachDB Cloud REST API proxy
      parameters:
        - name: action
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ccloud data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CcloudResult"

  /metrics/cluster:
    get:
      operationId: getClusterHealth
      tags: [metrics]
      summary: Live cluster health via CockroachDB Cloud MCP
      responses:
        "200":
          description: Cluster health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterHealth"

  /metrics/ingest:
    post:
      operationId: ingestMetrics
      tags: [metrics]
      summary: Ingest metric datapoints for predictive anomaly detection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetricIngestInput"
      responses:
        "200":
          description: Ingest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricIngestResult"

  /metrics/seed:
    post:
      operationId: seedVectorMemory
      tags: [metrics]
      summary: Seed vector memory with synthetic incidents
      responses:
        "200":
          description: Seed result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeedResult"

  # ── Chaos ─────────────────────────────────────────────────────────────────
  /chaos/sigkill:
    post:
      operationId: sigkillProcess
      tags: [chaos]
      summary: SIGKILL the API server process (chaos demo)
      responses:
        "202":
          description: Kill signal sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SigkillResult"

  # ── Webhooks ──────────────────────────────────────────────────────────────
  /webhook/cloudwatch:
    post:
      operationId: simulateCloudwatchWebhook
      tags: [webhooks]
      summary: Simulate or receive a CloudWatch/SNS alarm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloudwatchAlarmInput"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResult"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    AlertInput:
      type: object
      required: [alertText]
      properties:
        alertText:
          type: string
          minLength: 1
        simulateCrash:
          type: boolean
          default: false
        chaosMode:
          type: string

    CorrectionInput:
      type: object
      required: [suggestedStrategy]
      properties:
        suggestedStrategy:
          type: string

    CloudwatchAlarmInput:
      type: object
      required: [AlarmName]
      properties:
        AlarmName:
          type: string
        NewStateValue:
          type: string
        NewStateReason:
          type: string
        Region:
          type: string

    MetricIngestInput:
      type: object
      required: [datapoints]
      properties:
        datapoints:
          type: array
          items:
            $ref: "#/components/schemas/MetricDatapoint"

    MetricDatapoint:
      type: object
      required: [metricName, value]
      properties:
        metricName:
          type: string
        value:
          type: number
        dimensions:
          type: object
          additionalProperties:
            type: string
        serviceHint:
          type: string

    AgentTurn:
      type: object
      required: [turn, thought, toolName, toolInput, toolOutput]
      properties:
        turn:
          type: integer
        agent:
          type: string
        thought:
          type: string
        thoughtSource:
          type: string
          enum: [anthropic, bedrock, simulated]
        toolName:
          type: string
        toolInput:
          type: object
          additionalProperties: true
        toolOutput:
          type: object
          additionalProperties: true

    IncidentContext:
      type: object
      properties:
        alertText:
          type: string
        strategyName:
          type: string
        routingMode:
          type: string
          enum: [AUTONOMOUS, PENDING_APPROVAL, EXPLORATORY, REJECTED]
        routingDecisionComputed:
          type: boolean
        ragScore:
          type: ["number", "null"]
        ragStrategyHint:
          type: ["string", "null"]
        winRate:
          type: ["number", "null"]
        winRateSampleSize:
          type: integer
        turns:
          type: array
          items:
            $ref: "#/components/schemas/AgentTurn"
        finalResponse:
          type: ["string", "null"]
        crashed:
          type: boolean
      additionalProperties: true

    Incident:
      type: object
      required: [incidentId, alertFingerprint, status, currentStep, contextJson, updatedAt]
      properties:
        incidentId:
          type: string
        alertFingerprint:
          type: string
        status:
          type: string
          enum: [TRIGGERED, DIAGNOSING, REPAIRING, RESOLVED, FAILED, PENDING_APPROVAL, PREDICTIVE]
        currentStep:
          type: ["string", "null"]
        contextJson:
          $ref: "#/components/schemas/IncidentContext"
        claimedByAgent:
          type: ["string", "null"]
        causedByIncidentId:
          type: ["string", "null"]
        updatedAt:
          type: string

    ExecutionLog:
      type: object
      required: [logId, incidentId, actionTaken, result, createdAt]
      properties:
        logId:
          type: string
        incidentId:
          type: string
        actionTaken:
          type: string
        result:
          type: ["string", "null"]
        createdAt:
          type: string

    LogCount:
      type: object
      required: [count]
      properties:
        count:
          type: integer

    WinRate:
      type: object
      required: [strategyName, winRate, totalCount, successCount]
      properties:
        strategyName:
          type: string
        winRate:
          type: number
        totalCount:
          type: integer
        successCount:
          type: integer

    ImpactMetrics:
      type: object
      properties:
        totalIncidents:
          type: integer
        resolvedCount:
          type: integer
        avgAgentMttrMinutes:
          type: ["number", "null"]
        humanBaselineMttrMinutes:
          type: number
        mttrSavingsPercent:
          type: ["number", "null"]
        estimatedCostSavingsUsd:
          type: ["number", "null"]
        autonomousCount:
          type: integer
        pendingApprovalCount:
          type: integer
        exploratoryCount:
          type: integer
      additionalProperties: true

    CalibrationEntry:
      type: object
      properties:
        strategyName:
          type: string
        predictedWinRate:
          type: ["number", "null"]
        observedWinRate:
          type: ["number", "null"]
        correctionFactor:
          type: ["number", "null"]
        calibratedAt:
          type: ["string", "null"]
        sampleSize:
          type: integer
      additionalProperties: true

    RecalibrateResult:
      type: object
      properties:
        recalibrated:
          type: integer
        message:
          type: string

    CcloudResult:
      type: object
      additionalProperties: true

    ClusterHealth:
      type: object
      additionalProperties: true

    MetricIngestResult:
      type: object
      properties:
        message:
          type: string
        predictiveIncidents:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true

    SeedResult:
      type: object
      required: [seeded, count]
      properties:
        seeded:
          type: boolean
        count:
          type: integer

    SigkillResult:
      type: object
      properties:
        message:
          type: string
        pid:
          type: integer
        note:
          type: string

    WebhookResult:
      type: object
      properties:
        incidentId:
          type: string
        status:
          type: string
        message:
          type: string

    CausalChainResult:
      type: object
      properties:
        incidentId:
          type: string
        chain:
          type: array
          items:
            type: object
            additionalProperties: true
        note:
          type: string

    Playbook:
      type: object
      properties:
        playbookId:
          type: string
        incidentId:
          type: string
        strategyName:
          type: string
        title:
          type: string
        contentMd:
          type: string
        generatedBy:
          type: string
        createdAt:
          type: string
      additionalProperties: true

    RollbackPlanResult:
      type: object
      properties:
        rollbackId:
          type: string
        incidentId:
          type: string
        strategyName:
          type: string
        preRepairState:
          type: object
          additionalProperties: true
        executedCommands:
          type: string
        rollbackSteps:
          type: string
        estimatedRollbackTime:
          type: ["string", "null"]
        riskLevel:
          type: string
        createdAt:
          type: string
      additionalProperties: true

    Handoff:
      type: object
      properties:
        fromAgent:
          type: string
        toAgent:
          type: string
        incidentId:
          type: string
        handoffAt:
          type: string
        summary:
          type: string
      additionalProperties: true
