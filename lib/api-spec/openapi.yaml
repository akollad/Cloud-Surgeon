openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: incidents
    description: Cloud-Surgeon incident agent operations
paths:
  /incidents/trigger:
    post:
      operationId: triggerIncident
      tags: [incidents]
      summary: Trigger (or resume) the Cloud-Surgeon agent for an alert
      description: >
        Plays the role of the AWS API Gateway + Lambda entry point. Looks up
        (or creates) the incident by a fingerprint derived from the alert
        text, runs the simulated Claude 3.5 Sonnet tool-calling loop from
        wherever it last left off, persisting state to CockroachDB/Postgres
        after every turn, and returns the resulting incident. If
        `simulateCrash` is true, the loop stops after the first turn without
        finishing, to demonstrate that the next call resumes instead of
        restarting.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertInput"
      responses:
        "200":
          description: Incident created or resumed and processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"
        "400":
          description: Invalid request body
  /incidents:
    get:
      operationId: listIncidents
      tags: [incidents]
      summary: List recent incidents
      responses:
        "200":
          description: Recent incidents, most recently updated first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Incident"
  /incidents/{incidentId}:
    get:
      operationId: getIncident
      tags: [incidents]
      summary: Get a single incident by id
      parameters:
        - name: incidentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The incident
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"
        "404":
          description: Incident not found
  /logs:
    get:
      operationId: listExecutionLogs
      tags: [incidents]
      summary: List recent execution log entries
      parameters:
        - name: incidentId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Recent execution log entries, most recent first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExecutionLog"
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AlertInput:
      type: object
      required: [alertText]
      properties:
        alertText:
          type: string
          minLength: 1
        simulateCrash:
          type: boolean
          description: >
            If true, stop the agent loop right after the first turn without
            finishing, to demonstrate resumable state.
          default: false
    AgentTurn:
      type: object
      required: [turn, thought, toolName, toolInput, toolOutput]
      properties:
        turn:
          type: integer
        agent:
          type: string
          description: Nom de l'agent ayant exécuté ce tour (diagnostician/remediator/auditor)
        thought:
          type: string
        thoughtSource:
          type: string
          enum: [bedrock, simulated]
        toolName:
          type: string
        toolInput:
          type: object
          additionalProperties: true
        toolOutput:
          type: object
          additionalProperties: true
    IncidentContext:
      type: object
      properties:
        alertText:
          type: string
        strategyName:
          type: string
          description: Stratégie de réparation détectée/choisie pour cet incident
        # Couche 2 — décision de routage
        routingMode:
          type: string
          enum: [AUTONOMOUS, PENDING_APPROVAL, EXPLORATORY, REJECTED]
          description: Mode de routage décidé par la Couche 2 (mémoire → confiance → action)
        routingDecisionComputed:
          type: boolean
        ragScore:
          type: number
          nullable: true
          description: Distance cosinus RAG (0 = identique, 1 = opposé)
        ragStrategyHint:
          type: string
          nullable: true
          description: Stratégie de l'incident le plus similaire dans la mémoire vectorielle
        winRate:
          type: number
          nullable: true
          description: Taux de succès historique de la stratégie (0–1)
        winRateSampleSize:
          type: integer
          description: Nombre de samples ayant servi au calcul du win-rate
        turns:
          type: array
          items:
            $ref: "#/components/schemas/AgentTurn"
        finalResponse:
          type: string
          nullable: true
        crashed:
          type: boolean
      additionalProperties: true
    Incident:
      type: object
      required:
        [
          incidentId,
          alertFingerprint,
          status,
          currentStep,
          contextJson,
          updatedAt,
        ]
      properties:
        incidentId:
          type: string
        alertFingerprint:
          type: string
        status:
          type: string
          enum: [TRIGGERED, DIAGNOSING, REPAIRING, RESOLVED, FAILED, PENDING_APPROVAL]
        currentStep:
          type: ["string", "null"]
        contextJson:
          $ref: "#/components/schemas/IncidentContext"
        claimedByAgent:
          type: string
          nullable: true
          description: Agent ayant réclamé cet incident via transaction sérialisable
        causedByIncidentId:
          type: string
          nullable: true
          description: Incident parent dans la chaîne causale (CTE récursive)
        updatedAt:
          type: string
          format: date-time
    ExecutionLog:
      type: object
      required: [logId, incidentId, actionTaken, result, createdAt]
      properties:
        logId:
          type: string
        incidentId:
          type: string
        actionTaken:
          type: string
        result:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

